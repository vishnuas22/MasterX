<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MasterX Lite</title>

  <!-- Fonts & Styles -->
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Optional: Progressive Web App Ready -->
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="MasterX Lite - A God-Level AI Companion" />
</head>

<body>

  <!-- 🌀 Ultra Cosmic Parallax Background -->
  <div class="cosmic-bg">
    <div class="starfield layer1"></div>
    <div class="starfield layer2"></div>
    <div class="starfield layer3"></div>
    <div class="nebula"></div>
    <div class="neural-grid"></div>
    <div class="shooting-stars"></div>
    <div class="constellation-lines"></div>
    <div class="parallax-meteors"></div>
  </div>

  <!-- 🧭 Side Navigation -->
  <nav class="sidebar" role="navigation" aria-label="MasterX Navigation">
    <div class="sidebar-header">
      <h1>MasterX</h1>
    </div>
    <ul class="nav-links">
      <li class="nav-item active">
        <span class="icon">🧠</span>
        <span class="label">MasterX</span>
      </li>
      <li class="nav-item">
        <span class="icon">💻</span>
        <span class="label">Code Maniac</span>
      </li>
      <li class="nav-item">
        <span class="icon">🏰</span>
        <span class="label">Mind Palace</span>
      </li>
    </ul>
  </nav>

  <!-- 💬 Floating Chat Input Area -->
  <div class="floating-chat-container" role="region" aria-label="Floating Chat Input">
    
    <div class="floating-chat-area centered-glow">
      <div class="tagline">Ask anything. MasterX is listening...</div>

      <div class="floating-input-wrapper">
        <textarea
          id="masterx-input"
          placeholder="Type your thoughts..."
          rows="1"
          oninput="autoExpand(this)"
          aria-label="Chat input for MasterX"
        ></textarea>
        <button id="send-floating" aria-label="Send Message">
          <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>

</html>
