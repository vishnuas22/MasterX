<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MasterX Lite Ultra</title>

  <!-- Fonts and Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- Ultra UI Stylesheet -->
  <link rel="stylesheet" href="ultra-ui.css" />

  <!-- Custom Theme Styles -->
  <style>
    :root {
      --bg: #0e0e10;
      --fg: #ffffff;
      --accent: #4ade80;
      --card-bg: rgba(255, 255, 255, 0.05);
    }

    [data-theme='light'] {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --accent: #2563eb;
      --card-bg: rgba(0, 0, 0, 0.03);
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      margin: 0;
      transition: all 0.3s ease;
    }

    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background-color: var(--card-bg);
      padding: 1rem;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
    }

    #sidebar h2 {
      margin-top: 0;
    }

    #sidebar button {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      border: none;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      position: relative;
    }

    #chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
    }


    .chat-message {
      padding: 0.75rem;
      background: var(--card-bg);
      border-radius: 10px;
      margin-bottom: 0.5rem;
    }

    .bot {
      border-left: 4px solid var(--accent);
    }

    .user {
      text-align: right;
      border-left: 4px solid transparent;
    }

    #input-area {
      display: flex;
      margin-top: 1rem;
    }

    #user-input {
      flex: 1;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-family: 'Fira Code', monospace;
    }

    #send-btn {
      padding: 0.75rem 1rem;
      margin-left: 0.5rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--card-bg);
      border: none;
      color: var(--fg);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <h2>🚀 MasterX</h2>
      <nav>
        <button onclick="startTrack('python')">🐍 Python Track</button>
        <button onclick="resetProgress()">🧹 Reset Progress</button>
        <button onclick="showHelp()">🧠 Help</button>

        <button onclick="window.open('code-runner.html', '_blank')">💻 Code Runner</button>
      </nav>
    </aside>

    <!-- Main Chat Area -->
    <main id="main">
      <div id="chat-container">
        <div id="chat" class="chat-box"></div> <!-- 🔥 Messages appear here -->
      
        <!-- Your lesson tabs + content here -->
        <div id="lesson-tabs" class="tab-container" style="display: none;"></div>
        <div id="lesson-content" class="card" style="display: none;"></div>
      
        <!-- 👇 Input should be at the very bottom -->
        <div class="chat-input">
          <textarea id="user-input" placeholder="Ask me anything..."></textarea>
          <button id="send-btn">Send</button>
        </div>
      </div>
      
        
      </div>
    </main>
    
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
