<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#1e1b4b" />
        <meta name="description" content="MasterX Quantum Intelligence Platform - Advanced AI-powered learning and intelligence system with enterprise-grade performance" />
        <meta name="keywords" content="AI, Machine Learning, Quantum Intelligence, Enterprise AI, Multi-LLM, Advanced Analytics" />
        <meta name="author" content="MasterX Technologies" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="MasterX Quantum Intelligence Platform" />
        <meta property="og:description" content="Advanced AI-powered learning and intelligence system with multi-LLM integration and quantum-inspired algorithms" />
        <meta property="og:site_name" content="MasterX" />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:title" content="MasterX Quantum Intelligence Platform" />
        <meta property="twitter:description" content="Enterprise-grade AI solutions with quantum intelligence" />

        <!-- Favicon and App Icons -->
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

        <!-- Web App Manifest -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

        <title>MasterX | Quantum Intelligence Platform</title>

        <!-- Preload critical resources -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <!-- Performance and Security -->
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="robots" content="index, follow" />

        <!-- Custom CSS for loading state -->
        <style>
            #root {
                min-height: 100vh;
                background: linear-gradient(135deg, #0f172a 0%, #581c87 50%, #0f172a 100%);
            }

            /* Loading animation for initial render */
            .loading-placeholder {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                background: linear-gradient(135deg, #0f172a 0%, #581c87 50%, #0f172a 100%);
                color: white;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            }

            .loading-spinner {
                width: 40px;
                height: 40px;
                border: 3px solid rgba(255, 255, 255, 0.1);
                border-top: 3px solid #06b6d4;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin-right: 16px;
            }

            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>
    <body>
        <noscript>
            <div style="padding: 20px; text-align: center; font-family: Arial, sans-serif;">
                <h1>MasterX Quantum Intelligence Platform</h1>
                <p>You need to enable JavaScript to run this application.</p>
                <p>Please enable JavaScript in your browser settings and refresh the page.</p>
            </div>
        </noscript>

        <div id="root">
            <!-- Loading placeholder while React loads -->
            <div class="loading-placeholder">
                <div class="loading-spinner"></div>
                <div>
                    <h2 style="margin: 0; font-size: 24px; font-weight: 600;">MasterX</h2>
                    <p style="margin: 8px 0 0 0; opacity: 0.8;">Initializing Quantum Intelligence...</p>
                </div>
            </div>
        </div>
        <!--
            MasterX Quantum Intelligence Platform
            Enterprise-grade AI solutions with quantum-inspired algorithms

            This application requires JavaScript to function properly.
            Built with React and modern web technologies for optimal performance.
        -->
    </body>
</html>
